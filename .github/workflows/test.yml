name: Compatibility Matrix

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # AGP 8.3+ requires Gradle 8.4+ and supports Kotlin 1.9.x
          - gradle-version: "8.4"
            agp-version: "8.3.0"
            kgp-version: "1.9.24"
          # AGP 8.4+ requires Gradle 8.6+ and supports Kotlin 1.9.x
          - gradle-version: "8.6"
            agp-version: "8.4.0"
            kgp-version: "1.9.24"
          # AGP 8.5+ requires Gradle 8.7+ and supports Kotlin 2.0.x
          - gradle-version: "8.7"
            agp-version: "8.5.0"
            kgp-version: "2.0.0"
          # AGP 8.6+ requires Gradle 8.7+ and supports Kotlin 2.1.x
          - gradle-version: "8.7"
            agp-version: "8.6.0"
            kgp-version: "2.1.0"
          # AGP 8.7+ requires Gradle 8.9+ and supports Kotlin 2.1.x
          - gradle-version: "8.9"
            agp-version: "8.7.0"
            kgp-version: "2.1.0"
          # AGP 8.8+ requires Gradle 8.10.2+ and supports Kotlin 2.1.x
          - gradle-version: "8.10.2"
            agp-version: "8.8.0"
            kgp-version: "2.1.0"
          # AGP 8.9+ requires Gradle 8.11.1+ and supports Kotlin 2.1.x
          - gradle-version: "8.11.1"
            agp-version: "8.9.0"
            kgp-version: "2.1.0"
          # AGP 8.10+ requires Gradle 8.11.1+ and supports Kotlin 2.2.x
          - gradle-version: "8.11.1"
            agp-version: "8.10.0"
            kgp-version: "2.2.0"
          # AGP 8.11+ requires Gradle 8.13+ and supports Kotlin 2.2.x
          - gradle-version: "8.13"
            agp-version: "8.11.0"
            kgp-version: "2.2.0"
          # AGP 8.12+ requires Gradle 8.13+ and supports Kotlin 2.2.x
          - gradle-version: "8.13"
            agp-version: "8.12.0"
            kgp-version: "2.2.0"
          # AGP 8.13.2+ supports Kotlin 2.3.x
          - gradle-version: "8.14.2"
            agp-version: "8.13.2"
            kgp-version: "2.3.0"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Test Compatibility
        run: ./gradlew test -PtestGradleVersion=${{ matrix.gradle-version }} -PtestAgpVersion=${{ matrix.agp-version }} -PtestKgpVersion=${{ matrix.kgp-version }}
